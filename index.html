<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance App</title>
    <link rel="stylesheet" href="./styles.css">
</head>

<body>

    <div id="authContainer">
        <h2>🔐 Login</h2>
        <input type="text" id="username" placeholder="Usuário">
        <input type="password" id="password" placeholder="Senha">
        <button onclick="login()">Entrar</button>
        <button onclick="register()">Cadastrar</button>
        <p id="authMessage"></p>
    </div>

    <div id="appContainer" style="display:none;">
        <button onclick="logout()" style="margin-bottom:10px;">🚪 Sair</button>
        <div class="dashboard">


            <!-- Área de lançamento -->
            <div class="sidebar">
                <h2>💸 Nova Conta</h2>

                <input type="text" id="billName" placeholder="Nome da conta">
                <input type="number" id="billValue" placeholder="Valor">

                <select id="billMonth">
                    <option>Janeiro</option>
                    <option>Fevereiro</option>
                    <option>Março</option>
                    <option>Abril</option>
                    <option>Maio</option>
                    <option>Junho</option>
                    <option>Julho</option>
                    <option>Agosto</option>
                    <option>Setembro</option>
                    <option>Outubro</option>
                    <option>Novembro</option>
                    <option>Dezembro</option>
                </select>

                <button onclick="addBill()">Adicionar</button>
            </div>


        </div>

        <div class="user-bar">
            <span id="loggedUser"></span>
            <button onclick="logout()" class="logout-btn">Sair</button>
        </div>



        <!-- Área do board -->
        <div class="year-summary" id="yearSummary"></div>
        <div class="board" id="board"></div>

    </div>

<script src="./script.js"></script>    

</body>

</html>
